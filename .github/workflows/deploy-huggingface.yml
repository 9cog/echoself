name: Deploy to HuggingFace Hub

on:
  workflow_dispatch:
    inputs:
      source_workflow:
        description: 'Source training workflow (netrain-cached or netrain)'
        required: true
        default: 'netrain-cached'
        type: choice
        options:
          - netrain-cached
          - netrain
      training_type:
        description: 'Training type to deploy (ci, scheduled, or full)'
        required: true
        default: 'scheduled'
        type: choice
        options:
          - ci
          - scheduled
          - full
      repo_id:
        description: 'HuggingFace repository ID (uses HFMODEL secret if empty)'
        required: false
        default: ''
        type: string
      upload_datasets:
        description: 'Upload training datasets'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create a release tag'
        required: false
        default: false
        type: boolean
  
  # Can also be triggered after successful training
  workflow_run:
    workflows: ["Train NanEcho Model with Caching - Deep Tree Echo Persona"]
    types:
      - completed
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if workflow_run was successful, or if manually triggered
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for release tagging
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch numpy tiktoken transformers huggingface_hub
    
    - name: Determine checkpoint source
      id: checkpoint
      run: |
        echo "🔍 Determining checkpoint source..."
        
        # Set defaults based on trigger type
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          SOURCE_WORKFLOW="${{ github.event.inputs.source_workflow }}"
          TRAINING_TYPE="${{ github.event.inputs.training_type }}"
        else
          # Triggered by workflow_run - use scheduled mode
          SOURCE_WORKFLOW="netrain-cached"
          TRAINING_TYPE="scheduled"
        fi
        
        echo "source_workflow=$SOURCE_WORKFLOW" >> $GITHUB_OUTPUT
        echo "training_type=$TRAINING_TYPE" >> $GITHUB_OUTPUT
        
        # Determine output directory based on training type
        if [[ "$SOURCE_WORKFLOW" == "netrain-cached" ]]; then
          OUTPUT_DIR=".training-progress/nanecho-cached-${TRAINING_TYPE}"
        else
          OUTPUT_DIR="out-nanecho-${TRAINING_TYPE}"
        fi
        
        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT
        echo "📁 Checkpoint directory: $OUTPUT_DIR"
    
    - name: Restore checkpoint from git
      id: git_checkpoint
      run: |
        echo "📦 Checking for checkpoint in git repository..."
        
        # Check .training-progress/checkpoints for committed checkpoints
        if [ -f ".training-progress/checkpoints/latest_checkpoint.pt" ]; then
          echo "✅ Found checkpoint in .training-progress/checkpoints/"
          mkdir -p checkpoint-source
          cp .training-progress/checkpoints/latest_checkpoint.pt checkpoint-source/model.pt
          echo "found=true" >> $GITHUB_OUTPUT
          echo "path=checkpoint-source/model.pt" >> $GITHUB_OUTPUT
        else
          echo "⚠️ No checkpoint found in git repository"
          echo "found=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Download checkpoint from artifacts
      if: steps.git_checkpoint.outputs.found != 'true'
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ${{ steps.checkpoint.outputs.source_workflow }}.yml
        name: checkpoint-backup-*
        name_is_regexp: true
        path: checkpoint-source
        if_no_artifact_found: warn
      continue-on-error: true
    
    - name: Locate best checkpoint
      id: locate
      run: |
        echo "🔍 Locating best checkpoint..."
        
        CHECKPOINT_PATH=""
        
        # Priority 1: Git checkpoint (placed directly by git_checkpoint step)
        if [ -f "checkpoint-source/model.pt" ]; then
          CHECKPOINT_PATH="checkpoint-source/model.pt"
          echo "✅ Using checkpoint from git"
        
        # Priority 2: Search downloaded artifacts recursively.
        # dawidd6/action-download-artifact@v6 with name_is_regexp places each
        # matched artifact in its own subdirectory (e.g. checkpoint-source/<artifact-name>/),
        # so we must search recursively rather than checking flat paths.
        else
          for pattern in "latest_checkpoint.pt" "best_model.pt" "ckpt.pt"; do
            FOUND=$(find checkpoint-source -maxdepth 5 -name "$pattern" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              CHECKPOINT_PATH="$FOUND"
              echo "✅ Found checkpoint in downloaded artifacts: $CHECKPOINT_PATH"
              break
            fi
          done
        fi
        
        # Priority 3: Check output directory from current training
        if [ -z "$CHECKPOINT_PATH" ] && [ -f "${{ steps.checkpoint.outputs.output_dir }}/best_model_export.pt" ]; then
          CHECKPOINT_PATH="${{ steps.checkpoint.outputs.output_dir }}/best_model_export.pt"
          echo "✅ Using checkpoint from output directory"
        fi
        
        # Priority 4: Check cache directory
        if [ -z "$CHECKPOINT_PATH" ] && [ -f "${{ steps.checkpoint.outputs.output_dir }}/cache/checkpoints/latest.pt" ]; then
          CHECKPOINT_PATH="${{ steps.checkpoint.outputs.output_dir }}/cache/checkpoints/latest.pt"
          echo "✅ Using checkpoint from cache"
        fi
        
        if [ -z "$CHECKPOINT_PATH" ]; then
          echo "⚠️ WARNING: No checkpoint found!"
          echo "Searched locations:"
          echo "  - checkpoint-source/model.pt (git)"
          echo "  - checkpoint-source/**/latest_checkpoint.pt (artifact, recursive)"
          echo "  - checkpoint-source/**/best_model.pt (artifact, recursive)"
          echo "  - checkpoint-source/**/ckpt.pt (artifact, recursive)"
          echo "  - ${{ steps.checkpoint.outputs.output_dir }}/best_model_export.pt"
          echo "  - ${{ steps.checkpoint.outputs.output_dir }}/cache/checkpoints/latest.pt"
          echo ""
          echo "Deployment will be skipped. To deploy, ensure a checkpoint exists by:"
          echo "  1. Running a successful training workflow first, or"
          echo "  2. Configuring HFMODEL and HFESELF secrets, then triggering a training run"
          echo "checkpoint_found=false" >> $GITHUB_OUTPUT
        else
          echo "checkpoint_found=true" >> $GITHUB_OUTPUT
          echo "checkpoint_path=$CHECKPOINT_PATH" >> $GITHUB_OUTPUT
          echo "📍 Checkpoint location: $CHECKPOINT_PATH"
          ls -lh "$CHECKPOINT_PATH"
        fi
    
    - name: Convert to HuggingFace format
      if: steps.locate.outputs.checkpoint_found == 'true'
      run: |
        echo "🔄 Converting checkpoint to HuggingFace format..."
        
        python NanEcho/convert_to_huggingface.py \
          --checkpoint "${{ steps.locate.outputs.checkpoint_path }}" \
          --output-dir hf-model
        
        echo "✅ Conversion complete"
        echo "📊 HuggingFace model contents:"
        ls -lh hf-model/
    
    - name: Prepare datasets for upload
      if: (steps.locate.outputs.checkpoint_found == 'true') && (github.event.inputs.upload_datasets == 'true' || github.event_name == 'workflow_run')
      run: |
        echo "📦 Preparing datasets..."
        
        mkdir -p hf-model/datasets
        
        # Copy training data if available
        if [ -d "data/nanecho" ]; then
          cp -r data/nanecho/* hf-model/datasets/ || echo "⚠️ No data to copy"
          echo "✅ Copied training datasets"
        else
          echo "⚠️ No datasets found in data/nanecho"
        fi
        
        # Create dataset card
        echo "# EchoSelf Training Datasets" > hf-model/datasets/README.md
        echo "" >> hf-model/datasets/README.md
        echo "This directory contains the training datasets used to train the EchoSelf NanEcho model." >> hf-model/datasets/README.md
        echo "" >> hf-model/datasets/README.md
        echo "## Files" >> hf-model/datasets/README.md
        echo "" >> hf-model/datasets/README.md
        echo "- train.bin - Training data (tokenized)" >> hf-model/datasets/README.md
        echo "- val.bin - Validation data (tokenized)" >> hf-model/datasets/README.md
        echo "- metadata.json - Dataset metadata and configuration" >> hf-model/datasets/README.md
        
        echo "✅ Dataset preparation complete"
    
    - name: Upload to HuggingFace Hub
      if: steps.locate.outputs.checkpoint_found == 'true'
      env:
        HF_TOKEN: ${{ secrets.HFESELF }}
        HF_MODEL_REPO: ${{ secrets.HFMODEL }}
      run: |
        echo "🚀 Uploading to HuggingFace Hub..."
        
        if [ -z "$HF_TOKEN" ]; then
          echo "⚠️ WARNING: HFESELF secret not configured!"
          echo ""
          echo "To configure:"
          echo "  1. Go to https://huggingface.co/settings/tokens"
          echo "  2. Create a token with 'write' permissions"
          echo "  3. Add it as a secret named 'HFESELF' in GitHub repository settings"
          echo ""
          echo "Skipping upload - no HuggingFace token available"
          exit 0
        fi
        
        # Login to HuggingFace using Python API (avoids huggingface-cli PATH issues)
        # HF_TOKEN is already set as an env var in this step's env: block
        python -c "import os; from huggingface_hub import login; login(token=os.environ['HF_TOKEN'])"
        
        # Determine repo ID - use input if provided, otherwise use HFMODEL secret
        INPUT_REPO_ID="${{ github.event.inputs.repo_id }}"
        if [ -n "$INPUT_REPO_ID" ]; then
          REPO_ID="$INPUT_REPO_ID"
        elif [ -n "$HF_MODEL_REPO" ]; then
          REPO_ID="$HF_MODEL_REPO"
        else
          echo "⚠️ WARNING: No HuggingFace repository ID provided!"
          echo "Either provide repo_id input or configure HFMODEL secret"
          echo "Skipping upload - no repository ID available"
          exit 0
        fi
        
        echo "📤 Uploading to $REPO_ID"
        
        # Upload the model using Python API; pass REPO_ID via env var
        REPO_ID="$REPO_ID" python -c "
import os
from huggingface_hub import HfApi
api = HfApi()
api.upload_folder(
    folder_path='hf-model/',
    repo_id=os.environ['REPO_ID'],
    repo_type='model',
    commit_message='Deploy EchoSelf NanEcho model (workflow run ${{ github.run_number }})'
)
"
        
        echo "✅ Upload complete!"
        echo ""
        echo "🎉 Model deployed to: https://huggingface.co/$REPO_ID"
    
    - name: Create release tag
      if: (steps.locate.outputs.checkpoint_found == 'true') && (github.event.inputs.create_release == 'true')
      run: |
        echo "🏷️ Creating release tag..."
        
        # Configure git
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        
        # Create tag with timestamp
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        TAG_NAME="hf-deploy-${TIMESTAMP}"
        
        # Load checkpoint metadata for tag message
        METADATA_MSG="HuggingFace deployment"
        if [ -f "hf-model/training_metadata.json" ]; then
          QUALITY=$(jq -r '.quality_score // "N/A"' hf-model/training_metadata.json)
          LOSS=$(jq -r '.val_loss // "N/A"' hf-model/training_metadata.json)
          ITER=$(jq -r '.iteration // "N/A"' hf-model/training_metadata.json)
          METADATA_MSG="Quality: $QUALITY, Loss: $LOSS, Iteration: $ITER"
        fi
        
        git tag -a "$TAG_NAME" -m "HuggingFace deployment: $TAG_NAME" -m "$METADATA_MSG"
        git push origin "$TAG_NAME"
        
        echo "✅ Created tag: $TAG_NAME"
    
    - name: Create deployment summary
      if: always()
      env:
        HF_MODEL_REPO: ${{ secrets.HFMODEL }}
      run: |
        echo "📝 Deployment Summary"
        echo "===================="
        echo ""
        echo "**Workflow Run**: ${{ github.run_number }}"
        echo "**Timestamp**: $(date -u)"
        echo ""

        # Report checkpoint status
        if [ "${{ steps.locate.outputs.checkpoint_found }}" != "true" ]; then
          echo "**Status**: ⚠️ SKIPPED - No checkpoint available"
          echo ""
          echo "No trained model checkpoint was found. To deploy:"
          echo "  1. Run a successful training workflow first"
          echo "  2. The deployment will automatically trigger after successful training"
          exit 0
        fi

        # Determine repo ID for summary - use input if provided, otherwise use HFMODEL secret
        INPUT_REPO_ID="${{ github.event.inputs.repo_id }}"
        if [ -n "$INPUT_REPO_ID" ]; then
          REPO_ID="$INPUT_REPO_ID"
        elif [ -n "$HF_MODEL_REPO" ]; then
          REPO_ID="$HF_MODEL_REPO"
        else
          echo "**Status**: ⚠️ SKIPPED - No HuggingFace repository configured"
          echo ""
          echo "To configure deployment:"
          echo "  1. Go to https://huggingface.co/settings/tokens"
          echo "  2. Create a token with 'write' permissions"
          echo "  3. Add HFESELF (token) and HFMODEL (repo ID) as repository secrets"
          exit 0
        fi
        
        echo "**Repository**: $REPO_ID"
        echo ""
        
        if [ -f "hf-model/training_metadata.json" ]; then
          echo "**Training Metadata**:"
          cat hf-model/training_metadata.json | jq '.'
        fi
        
        echo ""
        echo "**Model URL**: https://huggingface.co/$REPO_ID"
        
    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      if: always() && steps.locate.outputs.checkpoint_found == 'true'
      with:
        name: hf-deployment-${{ github.run_number }}
        path: |
          hf-model/
          !hf-model/pytorch_model.bin
        retention-days: 30
