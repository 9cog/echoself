name: Train NanEcho Model with Caching - Deep Tree Echo Persona

on:
  push:
    branches: [ main, master ]
    paths:
      - 'NanEcho/**'
      - 'echoself.md'
      - 'echo/**'
      - 'training_cache.py'
      - 'train_cached.py'
      - '.github/workflows/netrain-cached.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'NanEcho/**'
      - 'echoself.md'
      - 'echo/**'
      - 'training_cache.py'
      - 'train_cached.py'
      - '.github/workflows/netrain-cached.yml'
  schedule:
    # Run iterative training every 6 hours to continuously improve
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      training_type:
        description: 'Training type (ci or full)'
        required: True
        default: 'ci'
        type: choice
        options:
          - ci
          - full
      max_iters:
        description: 'Maximum training iterations per session'
        required: False
        default: '1000'
        type: string
      force_fresh_start:
        description: 'DANGEROUS: Force fresh start - ONLY use if you understand this deletes all training progress'
        required: False
        default: 'false'
        type: boolean
      confirm_fresh_start:
        description: 'Type "I CONFIRM FRESH START" to enable force_fresh_start (required safety check)'
        required: False
        default: ''
        type: string
      max_checkpoints:
        description: 'Maximum cached checkpoints to keep'
        required: False
        default: '10'
        type: string
      max_cache_size_gb:
        description: 'Maximum cache size in GB'
        required: False
        default: '5.0'
        type: string
      download_from_hf:
        description: 'Download initial model from HuggingFace Hub before training'
        required: False
        default: false
        type: boolean
      hf_repo_id:
        description: 'HuggingFace repository ID to download from (uses HFMODEL secret if empty)'
        required: False
        default: ''
        type: string

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: False
      matrix:
        python-version: ["3.10"]
    env:
      # Default output directory used as fallback when steps.params is skipped
      # Matches the CI-mode output path set in the Determine training parameters step
      DEFAULT_OUTPUT_DIR: .training-progress/nanecho-cached-ci

    steps:
    - name: Checkout echoself repository
      uses: actions/checkout@v4
      with:
        path: echoself
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ github.workspace }}/echoself/requirements.txt

    # ================================================================
    # HUGGINGFACE MODEL DOWNLOAD (OPTIONAL)
    # Download pre-trained model from HuggingFace Hub to continue training
    # Uses HFMODEL secret for repo ID if not explicitly provided
    # ================================================================

    - name: Download model from HuggingFace Hub
      if: github.event.inputs.download_from_hf == 'true'
      # continue-on-error: prevents a missing/invalid repo ID from failing all downstream steps
      continue-on-error: true
      env:
        HF_TOKEN: ${{ secrets.HFESELF }}
        # HF_MODEL_REPO is injected from the HFMODEL secret; must be 'namespace/repo_name'
        HF_MODEL_REPO: ${{ secrets.HFMODEL }}
      run: |
        cd echoself
        
        # Install HuggingFace Hub for model downloads
        pip install huggingface_hub
        
        # Determine repo ID - use input if provided, otherwise use HFMODEL secret
        INPUT_REPO_ID="${{ github.event.inputs.hf_repo_id }}"
        if [ -n "$INPUT_REPO_ID" ]; then
          REPO_ID="$INPUT_REPO_ID"
        elif [ -n "$HF_MODEL_REPO" ]; then
          REPO_ID="$HF_MODEL_REPO"
        else
          echo "❌ ERROR: No HuggingFace repository ID provided!"
          echo "Either provide hf_repo_id input or configure HFMODEL secret (value must be 'namespace/repo_name')"
          exit 1
        fi
        
        # Validate repo ID format: must be 'repo_name' or 'namespace/repo_name'
        # Both namespace and repo name must start with alphanumeric or underscore
        if ! echo "$REPO_ID" | grep -qE '^[a-zA-Z0-9_][a-zA-Z0-9_.-]*(/[a-zA-Z0-9_][a-zA-Z0-9._-]*)?$'; then
          echo "❌ ERROR: Invalid HuggingFace repository ID format."
          echo "Got: '$REPO_ID' — expected 'repo_name' or 'namespace/repo_name'"
          echo "Check the HFMODEL secret or hf_repo_id workflow input."
          exit 1
        fi
        
        echo "📥 Downloading model from HuggingFace Hub..."
        echo "Repository: $REPO_ID"
        
        # Download and convert model
        python NanEcho/download_from_huggingface.py \
          --repo-id "$REPO_ID" \
          --output-checkpoint ".training-progress/checkpoints/hf_init.pt" \
          --token "${HF_TOKEN}" \
          --cache-dir /tmp/hf-download
        
        echo "✅ Model downloaded and converted to NanEcho format"
        echo "📍 Checkpoint saved to: .training-progress/checkpoints/hf_init.pt"
        
        # The checkpoint will be automatically discovered by the training cache system

    # ================================================================
    # CUMULATIVE TRAINING SAFETY CHECK
    # ================================================================

    - name: Validate fresh start request (if any)
      id: safety_check
      run: |
        echo "🛡️ CHECKPOINT GUARDIAN: Safety validation"
        echo "=========================================="

        FORCE_FRESH="${{ github.event.inputs.force_fresh_start || 'false' }}"
        CONFIRM="${{ github.event.inputs.confirm_fresh_start || '' }}"

        if [[ "$FORCE_FRESH" == "true" ]]; then
          if [[ "$CONFIRM" != "I CONFIRM FRESH START" ]]; then
            echo "❌ SAFETY CHECK FAILED"
            echo ""
            echo "You requested force_fresh_start=true but did not provide the"
            echo "required confirmation string."
            echo ""
            echo "To force a fresh start (which DELETES all training progress):"
            echo "  1. Set force_fresh_start: true"
            echo "  2. Set confirm_fresh_start: 'I CONFIRM FRESH START'"
            echo ""
            echo "This safety check exists because fresh starts:"
            echo "  - Delete ALL cumulative training progress"
            echo "  - Cannot be undone"
            echo "  - Should only be used in extreme circumstances"
            echo ""
            echo "Defaulting to CUMULATIVE training mode (safe)."
            echo "allow_fresh_start=false" >> $GITHUB_OUTPUT
          else
            echo "⚠️ WARNING: Fresh start CONFIRMED by user"
            echo "   All previous checkpoints will be ignored"
            echo "   This action cannot be undone"
            echo "allow_fresh_start=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "✓ Cumulative training mode (default, safe)"
          echo "allow_fresh_start=false" >> $GITHUB_OUTPUT
        fi

    - name: Determine training parameters
      id: params
      run: |
        # Check training type and set parameters
        if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ github.event.inputs.training_type }}" == "ci" ]]; then
          echo "CI training mode - using reduced parameters"
          echo "n_layer=4" >> $GITHUB_OUTPUT
          echo "n_head=4" >> $GITHUB_OUTPUT
          echo "n_embd=256" >> $GITHUB_OUTPUT
          echo "max_iters=500" >> $GITHUB_OUTPUT
          echo "batch_size=2" >> $GITHUB_OUTPUT
          echo "learning_rate=2e-4" >> $GITHUB_OUTPUT
          echo "output_dir=.training-progress/nanecho-cached-ci" >> $GITHUB_OUTPUT
          echo "cache_key=ci" >> $GITHUB_OUTPUT
        elif [[ "${{ github.event_name }}" == "schedule" ]]; then
          echo "Scheduled iterative training mode"
          echo "n_layer=6" >> $GITHUB_OUTPUT
          echo "n_head=6" >> $GITHUB_OUTPUT
          echo "n_embd=384" >> $GITHUB_OUTPUT
          echo "max_iters=2000" >> $GITHUB_OUTPUT
          echo "batch_size=4" >> $GITHUB_OUTPUT
          echo "learning_rate=1e-4" >> $GITHUB_OUTPUT
          echo "output_dir=.training-progress/nanecho-cached-scheduled" >> $GITHUB_OUTPUT
          echo "cache_key=scheduled" >> $GITHUB_OUTPUT
        else
          echo "Full training mode - using specified parameters"
          echo "n_layer=8" >> $GITHUB_OUTPUT
          echo "n_head=8" >> $GITHUB_OUTPUT
          echo "n_embd=512" >> $GITHUB_OUTPUT
          echo "max_iters=${{ github.event.inputs.max_iters }}" >> $GITHUB_OUTPUT
          echo "batch_size=8" >> $GITHUB_OUTPUT
          echo "learning_rate=1e-4" >> $GITHUB_OUTPUT
          echo "output_dir=.training-progress/nanecho-cached-full" >> $GITHUB_OUTPUT
          echo "cache_key=full" >> $GITHUB_OUTPUT
        fi
        
        # Cache settings - use safety_check output, not raw input
        echo "force_fresh_start=${{ steps.safety_check.outputs.allow_fresh_start }}" >> $GITHUB_OUTPUT
        echo "max_checkpoints=${{ github.event.inputs.max_checkpoints || '10' }}" >> $GITHUB_OUTPUT
        echo "max_cache_size_gb=${{ github.event.inputs.max_cache_size_gb || '5.0' }}" >> $GITHUB_OUTPUT

    - name: Prepare directory structure
      run: |
        cd echoself
        mkdir -p data/nanecho
        mkdir -p ${{ steps.params.outputs.output_dir }}/cache

    - name: Set PYTHONPATH
      # Run even if earlier steps fail so project-local modules are always importable
      if: always()
      run: |
        # Extend PYTHONPATH to include the repo root, ensuring training_cache and
        # other project-local modules can be found regardless of working directory
        echo "PYTHONPATH=${{ github.workspace }}/echoself" >> $GITHUB_ENV

    - name: Cache training artifacts
      uses: actions/cache@v4
      with:
        path: |
          echoself/${{ steps.params.outputs.output_dir }}/cache
          echoself/data/nanecho
        key: nanecho-training-${{ steps.params.outputs.cache_key }}-${{ hashFiles('echoself/nanecho_model.py', 'echoself/training_cache.py') }}
        restore-keys: |
          nanecho-training-${{ steps.params.outputs.cache_key }}-

    - name: Download previous cached training artifacts
      uses: dawidd6/action-download-artifact@v6
      continue-on-error: true
      with:
        workflow: netrain-cached.yml
        name: nanecho-cached-training-${{ steps.params.outputs.cache_key }}
        path: echoself/.training-progress/artifacts
        search_artifacts: true
        if_no_artifact_found: warn

    - name: Restore checkpoints from previous artifacts
      continue-on-error: true
      run: |
        cd echoself
        OUTPUT_DIR="${{ steps.params.outputs.output_dir }}"
        ARTIFACTS_DIR=".training-progress/artifacts"

        if [ ! -d "$ARTIFACTS_DIR" ]; then
          echo "ℹ️ No artifacts directory found - skipping restore"
          exit 0
        fi

        PT_COUNT=$(find "$ARTIFACTS_DIR" -name "*.pt" -type f 2>/dev/null | wc -l)
        if [ "$PT_COUNT" -eq 0 ]; then
          echo "ℹ️ No .pt checkpoint files found in artifacts"
          exit 0
        fi

        echo "📦 Found $PT_COUNT checkpoint file(s) in artifacts - restoring..."

        DEST_CHECKPOINTS="$OUTPUT_DIR/cache/checkpoints"
        mkdir -p "$DEST_CHECKPOINTS"

        find "$ARTIFACTS_DIR" -name "*.pt" -type f | while read -r ptfile; do
          BASENAME=$(basename "$ptfile")
          if cp "$ptfile" "$DEST_CHECKPOINTS/$BASENAME"; then
            echo "  ✓ Restored: $BASENAME"
          fi
        done

        # Restore metadata.json from artifact (authoritative record of checkpoint history)
        META_FILE=$(find "$ARTIFACTS_DIR" -name "metadata.json" -path "*/cache/*" -type f 2>/dev/null | head -1)
        if [ -n "$META_FILE" ]; then
          mkdir -p "$OUTPUT_DIR/cache"
          cp "$META_FILE" "$OUTPUT_DIR/cache/metadata.json"
          echo "  ✓ Restored cache metadata.json"
        fi

        echo "✅ Checkpoint restore from artifacts complete"

    - name: Create minimal training data
      run: |
        cd echoself
        
        # Create minimal Echo Self training data for CI
        cat << 'EOFPYTHON' > /tmp/create_training_data.py
        import os
        import numpy as np
        import json
        
        os.makedirs('data/nanecho', exist_ok=True)
        
        # Sample Echo Self text patterns (character-level tokenization for simplicity)
        echo_patterns = [
            'Echo Self is a cognitive architecture with adaptive attention mechanisms.',
            'The persona dimensions include cognitive, introspective, adaptive, and recursive.',
            'Hypergraph patterns enable neural-symbolic reasoning and pattern encoding.',
            'Recursive reasoning allows multi-level introspection and self-examination.',
            'Adaptive attention adjusts thresholds based on cognitive load estimation.',
            'The holographic dimension enables comprehensive system modeling.',
            'Synergistic properties emerge from the interaction of persona dimensions.',
            'Dynamic evolution enables continuous learning and adaptation.',
        ]
        
        # Generate training text
        train_text = ' '.join(echo_patterns * 100)  # Repeat for more data
        val_text = ' '.join(echo_patterns * 20)
        
        # Simple character-level tokenization
        train_tokens = np.array([ord(c) % 256 for c in train_text], dtype=np.uint16)
        val_tokens = np.array([ord(c) % 256 for c in val_text], dtype=np.uint16)
        
        # Ensure minimum size
        min_size = 2048  # Minimum tokens needed
        if len(train_tokens) < min_size:
            train_tokens = np.tile(train_tokens, (min_size // len(train_tokens)) + 1)[:min_size]
        if len(val_tokens) < 512:
            val_tokens = np.tile(val_tokens, (512 // len(val_tokens)) + 1)[:512]
        
        # Save to binary files
        train_tokens.tofile('data/nanecho/train.bin')
        val_tokens.tofile('data/nanecho/val.bin')
        
        # Create metadata
        metadata = {
            'train_tokens': len(train_tokens),
            'val_tokens': len(val_tokens),
            'vocab_size': 256,
            'echo_depth': 7,
            'persona_weight': 0.95,
            'created_by': 'workflow_fallback',
            'description': 'Character-level Echo Self training data for CI'
        }
        
        with open('data/nanecho/metadata.json', 'w') as f:
            json.dump(metadata, f, indent=2)
        
        print(f'✅ Created training data: {len(train_tokens)} train, {len(val_tokens)} val tokens')
        EOFPYTHON
        python /tmp/create_training_data.py

    - name: Run cached training
      run: |
        cd echoself
        
        echo "🚀 Starting cached training session..."
        echo "📊 Training Parameters:"
        echo "   • Layers: ${{ steps.params.outputs.n_layer }}"
        echo "   • Embedding: ${{ steps.params.outputs.n_embd }}"
        echo "   • Max iterations: ${{ steps.params.outputs.max_iters }}"
        echo "   • Force fresh start: ${{ steps.params.outputs.force_fresh_start }}"
        echo "   • Max checkpoints: ${{ steps.params.outputs.max_checkpoints }}"
        echo "   • Max cache size: ${{ steps.params.outputs.max_cache_size_gb }} GB"
        
        # Create training config
        cat > training_config.json << EOL
        {
          "data_dir": "data/nanecho",
          "out_dir": "${{ steps.params.outputs.output_dir }}",
          "max_iters": ${{ steps.params.outputs.max_iters }},
          "batch_size": ${{ steps.params.outputs.batch_size }},
          "learning_rate": ${{ steps.params.outputs.learning_rate }},
          "device": "cpu",
          "n_layer": ${{ steps.params.outputs.n_layer }},
          "n_head": ${{ steps.params.outputs.n_head }},
          "n_embd": ${{ steps.params.outputs.n_embd }},
          "eval_interval": 100,
          "checkpoint_interval": 200,
          "connection_growth_interval": 100
        }
        EOL
        
        # Run training with caching
        python train_cached.py \
          --config training_config.json \
          --data_dir data/nanecho \
          --out_dir ${{ steps.params.outputs.output_dir }} \
          --max_iters ${{ steps.params.outputs.max_iters }} \
          --batch_size ${{ steps.params.outputs.batch_size }} \
          --learning_rate ${{ steps.params.outputs.learning_rate }} \
          --device cpu \
          --max_checkpoints ${{ steps.params.outputs.max_checkpoints }} \
          --max_cache_size_gb ${{ steps.params.outputs.max_cache_size_gb }} \
          ${{ steps.params.outputs.force_fresh_start == 'true' && '--force_fresh_start' || '' }}

    # ================================================================
    # POST-TRAINING ANALYSIS & BACKUP
    # ALL steps below use 'if: always()' to ensure backup can NEVER
    # be bypassed by any upstream failure. Training data preservation
    # is the highest priority without exception.
    # ================================================================

    - name: Analyze training progress
      if: always()
      continue-on-error: true
      run: |
        cd echoself
        
        # Show cache statistics
        echo "📊 Final Cache Statistics:"
        cat << 'EOFPYTHON' > /tmp/analyze_progress.py
        import sys, os
        # Ensure project-local modules (training_cache, etc.) are importable
        # even if the Set PYTHONPATH step was skipped due to an upstream failure
        sys.path.insert(0, os.getcwd())
        from training_cache import TrainingCache, CacheConfig
        import json
        
        cache_config = CacheConfig(cache_dir='${{ steps.params.outputs.output_dir || env.DEFAULT_OUTPUT_DIR }}/cache')
        cache = TrainingCache(cache_config)
        
        stats = cache.get_cache_stats()
        print(json.dumps(stats, indent=2))
        
        # List checkpoints
        checkpoints = cache.list_checkpoints()
        if checkpoints:
            print('\n📋 Available Checkpoints:')
            for i, ckpt in enumerate(checkpoints[:5]):
                print(f'   {i+1}. {ckpt.checkpoint_id}')
                print(f'      Quality: {ckpt.quality_score:.3f} | Loss: {ckpt.val_loss:.4f}')
                print(f'      Iteration: {ckpt.iteration} | Size: {ckpt.file_size_mb:.1f} MB')
                print(f'      Tags: {chr(44).join(ckpt.tags)}')
        EOFPYTHON
        python /tmp/analyze_progress.py

    - name: Test model generation
      if: always()
      continue-on-error: true
      run: |
        cd echoself
        
        # Test if we have a trained model
        if [ -f "${{ steps.params.outputs.output_dir }}/best_model_export.pt" ]; then
          echo "✅ Best model export found"
          ls -la ${{ steps.params.outputs.output_dir }}/best_model_export.pt
          
          # Show model info — use weights_only=False for numpy compatibility (PyTorch 2.6+)
          cat << 'EOFPYTHON' > /tmp/test_model.py
        import torch
        import numpy
        
        # Allow numpy scalar types for PyTorch 2.6+ compatibility
        try:
            torch.serialization.add_safe_globals([numpy._core.multiarray.scalar, numpy.dtype, numpy.ndarray])
        except (AttributeError, TypeError):
            pass  # Older PyTorch versions don't need this
        
        try:
            export_data = torch.load('${{ steps.params.outputs.output_dir }}/best_model_export.pt', map_location='cpu', weights_only=False)
        except Exception as e:
            print(f'⚠️ Could not fully load model for inspection: {e}')
            print('   This does NOT affect backup — checkpoint file exists and will be backed up.')
            import sys
            sys.exit(0)
        
        print('📦 Exported Model Info:')
        print(f'   Checkpoint ID: {export_data["metadata"]["checkpoint_id"]}')
        print(f'   Quality Score: {export_data["metadata"]["quality_score"]:.3f}')
        print(f'   Validation Loss: {export_data["metadata"]["val_loss"]:.4f}')
        print(f'   Training Iteration: {export_data["metadata"]["iteration"]}')
        print(f'   Connection Ratio: {export_data["metadata"]["metrics"].get("connection_ratio", "N/A")}')
        EOFPYTHON
          python /tmp/test_model.py
        else
          echo "⚠️ No best model export found (this is informational only — backup will still run)"
          echo "Available files:"
          ls -la ${{ steps.params.outputs.output_dir }}/ || true
        fi

    - name: Create training summary
      if: always()
      continue-on-error: true
      run: |
        cd echoself
        
        # Generate training summary
        # Note: fallback values prevent SyntaxError when steps.params outputs are
        # empty (e.g. when an earlier step failure caused the params step to be skipped)
        cat << 'EOFPYTHON' > /tmp/create_summary.py
        import json
        import os
        from pathlib import Path
        from datetime import datetime
        
        summary = {
            'workflow_run': '${{ github.run_number }}',
            'training_type': '${{ steps.params.outputs.output_dir }}',
            'completed_at': datetime.now().isoformat(),
            'parameters': {
                # Fallback values match CI-mode defaults (Determine training parameters step)
                # and prevent SyntaxError when steps.params outputs are empty
                'max_iters': ${{ steps.params.outputs.max_iters || '1000' }},
                'batch_size': ${{ steps.params.outputs.batch_size || '2' }},
                'learning_rate': ${{ steps.params.outputs.learning_rate || '2e-4' }},
                'model_layers': ${{ steps.params.outputs.n_layer || '4' }},
                'model_embedding': ${{ steps.params.outputs.n_embd || '256' }},
                'force_fresh_start': '${{ steps.params.outputs.force_fresh_start }}' == 'true'
            }
        }
        
        # Add cache statistics if available
        try:
            from training_cache import TrainingCache, CacheConfig
            cache_config = CacheConfig(cache_dir='${{ steps.params.outputs.output_dir || env.DEFAULT_OUTPUT_DIR }}/cache')
            cache = TrainingCache(cache_config)
            summary['cache_stats'] = cache.get_cache_stats()
            
            # Add best checkpoint info
            best_id = cache.get_best_checkpoint()
            if best_id and best_id in cache.metadata:
                best_metadata = cache.metadata[best_id]
                summary['best_checkpoint'] = {
                    'id': best_id,
                    'quality_score': best_metadata.quality_score,
                    'val_loss': best_metadata.val_loss,
                    'iteration': best_metadata.iteration,
                    'created_at': best_metadata.created_at
                }
        except Exception as e:
            summary['cache_error'] = str(e)
        
        # Save summary
        out_dir = '${{ steps.params.outputs.output_dir || env.DEFAULT_OUTPUT_DIR }}'
        os.makedirs(out_dir, exist_ok=True)
        with open(f'{out_dir}/training_summary.json', 'w') as f:
            json.dump(summary, f, indent=2)
        
        print('📝 Training Summary:')
        print(json.dumps(summary, indent=2))
        EOFPYTHON
        # Verify Python syntax before running to catch template expansion issues early
        python -m py_compile /tmp/create_summary.py || {
          echo "⚠️ Syntax error detected in create_summary.py — see script below:"
          cat /tmp/create_summary.py
          exit 1
        }
        python /tmp/create_summary.py

    # ================================================================
    # MULTI-LOCATION MODEL BACKUP
    # CRITICAL: Ensure model can NEVER be lost
    # ================================================================

    - name: Backup model to multiple locations
      if: always()
      run: |
        cd echoself
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)

        echo "🛡️ EMERGENCY MULTI-LOCATION MODEL BACKUP"
        echo "==========================================="
        echo "⚠️ This step runs UNCONDITIONALLY (if: always())"
        echo "   Backup is the #1 priority — nothing can bypass this."
        echo ""

        # Create backup directories
        mkdir -p .training-progress/checkpoints
        mkdir -p /tmp/nanecho-checkpoint-backup
        mkdir -p /tmp/nanecho-emergency-sweep

        BACKUP_COUNT=0
        TOTAL_FILES_BACKED_UP=0

        # ============================================================
        # PHASE 1: Find the best checkpoint to backup (priority order)
        # ============================================================
        BEST_CKPT=""
        echo "🔍 Phase 1: Searching for best checkpoint..."

        # Priority 1: Best model export
        if [ -f "${{ steps.params.outputs.output_dir }}/best_model_export.pt" ]; then
          BEST_CKPT="${{ steps.params.outputs.output_dir }}/best_model_export.pt"
          echo "   Found: best_model_export.pt"
        fi

        # Priority 2: Latest cache checkpoint
        if [ -z "$BEST_CKPT" ] && [ -f "${{ steps.params.outputs.output_dir }}/cache/checkpoints/latest.pt" ]; then
          BEST_CKPT="${{ steps.params.outputs.output_dir }}/cache/checkpoints/latest.pt"
          echo "   Found: cache/checkpoints/latest.pt"
        fi

        # Priority 3: Any .pt file in the output directory (sorted by size, largest first)
        if [ -z "$BEST_CKPT" ]; then
          BEST_CKPT=$(find "${{ steps.params.outputs.output_dir }}" -name '*.pt' -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -1 | awk '{print $2}')
          if [ -n "$BEST_CKPT" ]; then
            echo "   Found via sweep: $BEST_CKPT"
          fi
        fi

        # Priority 4: Any .pt file ANYWHERE in the workspace
        if [ -z "$BEST_CKPT" ]; then
          BEST_CKPT=$(find . -name '*.pt' -type f -printf '%s %p\n' 2>/dev/null | sort -rn | head -1 | awk '{print $2}')
          if [ -n "$BEST_CKPT" ]; then
            echo "   Found via full workspace sweep: $BEST_CKPT"
          fi
        fi

        if [ -n "$BEST_CKPT" ] && [ -f "$BEST_CKPT" ]; then
          CKPT_SIZE=$(stat -c%s "$BEST_CKPT" 2>/dev/null || echo 0)
          echo ""
          echo "📦 Best checkpoint: $BEST_CKPT ($(numfmt --to=iec $CKPT_SIZE 2>/dev/null || echo ${CKPT_SIZE}B))"

          # Backup 1: .training-progress/checkpoints (committed to repo)
          cp "$BEST_CKPT" ".training-progress/checkpoints/latest_checkpoint.pt" 2>/dev/null && {
            cp "$BEST_CKPT" ".training-progress/checkpoints/checkpoint_${TIMESTAMP}.pt" 2>/dev/null || true
            echo "   ✓ Location 1: .training-progress/checkpoints/"
            BACKUP_COUNT=$((BACKUP_COUNT + 1))
          } || echo "   ⚠️ Failed to backup to .training-progress/checkpoints"

          # Backup 2: /tmp for artifact upload
          cp "$BEST_CKPT" "/tmp/nanecho-checkpoint-backup/best_model.pt" 2>/dev/null && {
            echo "   ✓ Location 2: /tmp/nanecho-checkpoint-backup/"
            BACKUP_COUNT=$((BACKUP_COUNT + 1))
          } || echo "   ⚠️ Failed to backup to /tmp/nanecho-checkpoint-backup"

          # Backup 3: Emergency sweep directory (redundant safety net)
          cp "$BEST_CKPT" "/tmp/nanecho-emergency-sweep/best_model.pt" 2>/dev/null && {
            echo "   ✓ Location 3: /tmp/nanecho-emergency-sweep/"
            BACKUP_COUNT=$((BACKUP_COUNT + 1))
          } || echo "   ⚠️ Failed to backup to /tmp/nanecho-emergency-sweep"
        else
          echo "⚠️ No .pt checkpoint files found anywhere"
        fi

        # ============================================================
        # PHASE 2: Emergency sweep — backup ALL .pt files found
        # Even partial/damaged files are backed up for recovery
        # ============================================================
        echo ""
        echo "🔍 Phase 2: Emergency sweep — backing up ALL .pt files..."

        find . -name '*.pt' -type f 2>/dev/null | while read -r ptfile; do
          BASENAME=$(basename "$ptfile")
          DIRPATH=$(dirname "$ptfile" | tr '/' '_' | sed 's/^_\.//')
          DEST="/tmp/nanecho-emergency-sweep/${DIRPATH}__${BASENAME}"
          if cp "$ptfile" "$DEST" 2>/dev/null; then
            FILE_SIZE=$(stat -c%s "$ptfile" 2>/dev/null || echo '?')
            echo "   ✓ Swept: $ptfile (${FILE_SIZE} bytes)"
            TOTAL_FILES_BACKED_UP=$((TOTAL_FILES_BACKED_UP + 1))
          fi
        done

        # Also sweep cache metadata files (critical for checkpoint restoration)
        find . -name 'metadata.json' -path '*/cache/*' -type f 2>/dev/null | while read -r metafile; do
          BASENAME=$(basename "$metafile")
          DIRPATH=$(dirname "$metafile" | tr '/' '_' | sed 's/^_\.//')
          DEST="/tmp/nanecho-emergency-sweep/${DIRPATH}__${BASENAME}"
          cp "$metafile" "$DEST" 2>/dev/null && echo "   ✓ Swept metadata: $metafile" || true
        done

        # Also sweep training summary if it exists
        find . -name 'training_summary.json' -type f 2>/dev/null | while read -r sumfile; do
          cp "$sumfile" "/tmp/nanecho-emergency-sweep/training_summary.json" 2>/dev/null || true
        done

        # Also sweep introspection history if it exists
        find . -name 'introspection_history.json' -type f 2>/dev/null | while read -r introfile; do
          cp "$introfile" "/tmp/nanecho-emergency-sweep/introspection_history.json" 2>/dev/null || true
        done

        # ============================================================
        # PHASE 3: Create backup manifest
        # ============================================================
        echo ""
        echo "📋 Phase 3: Creating backup manifest..."

        MANIFEST_FILE=".training-progress/checkpoints/backup_manifest.json"
        cat > "$MANIFEST_FILE" << EOFMANIFEST
        {
          "timestamp": "${TIMESTAMP}",
          "workflow_run": "${{ github.run_number }}",
          "run_id": "${{ github.run_id }}",
          "output_dir": "${{ steps.params.outputs.output_dir }}",
          "best_checkpoint": "${BEST_CKPT:-none}",
          "backup_locations": $BACKUP_COUNT,
          "total_files_swept": $TOTAL_FILES_BACKED_UP,
          "commit": "${{ github.sha }}",
          "triggered_by": "${{ github.event_name }}",
          "backup_policy": "UNCONDITIONAL — if: always() — nothing can bypass this step"
        }
        EOFMANIFEST

        echo ""
        echo "════════════════════════════════════════════"
        if [ $BACKUP_COUNT -ge 2 ]; then
          echo "✅ BACKUP COMPLETE: $BACKUP_COUNT locations secured"
        elif [ $BACKUP_COUNT -ge 1 ]; then
          echo "⚠️ PARTIAL BACKUP: $BACKUP_COUNT location(s) — check logs"
        else
          echo "❌ NO BEST CHECKPOINT FOUND — but emergency sweep completed"
        fi
        echo "   Total files swept: $TOTAL_FILES_BACKED_UP"
        echo "════════════════════════════════════════════"

        # List everything in emergency sweep
        echo ""
        echo "📦 Emergency sweep contents:"
        ls -lah /tmp/nanecho-emergency-sweep/ 2>/dev/null || echo "   (empty)"
        echo ""
        echo "📦 Checkpoint backup contents:"
        ls -lah /tmp/nanecho-checkpoint-backup/ 2>/dev/null || echo "   (empty)"
        echo ""
        echo "📦 Training progress checkpoints:"
        ls -lah .training-progress/checkpoints/ 2>/dev/null || echo "   (empty)"

    # ================================================================
    # HUGGINGFACE MODEL UPLOAD
    # Upload the best trained model to HuggingFace Hub so the
    # published model stays in sync with the latest training run.
    # Requires HFESELF (write token) and HFMODEL (repo id) secrets.
    # ================================================================
    - name: Upload model to HuggingFace Hub
      if: always()
      continue-on-error: true
      env:
        HF_TOKEN: ${{ secrets.HFESELF }}
        REPO_ID: ${{ secrets.HFMODEL }}
        COMMIT_MESSAGE: "Training update: run ${{ github.run_number }}, ${{ steps.params.outputs.max_iters }} iters, cache_key=${{ steps.params.outputs.cache_key }}"
      run: |
        cd echoself

        if [ -z "$HF_TOKEN" ] || [ -z "$REPO_ID" ]; then
          echo "⚠️ Skipping HuggingFace upload: HFESELF or HFMODEL secret not configured"
          exit 0
        fi

        # Locate the best available model (priority order)
        BEST_MODEL=""
        if [ -f "${{ steps.params.outputs.output_dir }}/best_model_export.pt" ]; then
          BEST_MODEL="${{ steps.params.outputs.output_dir }}/best_model_export.pt"
        elif [ -f ".training-progress/checkpoints/latest_checkpoint.pt" ]; then
          BEST_MODEL=".training-progress/checkpoints/latest_checkpoint.pt"
        fi

        if [ -z "$BEST_MODEL" ]; then
          echo "⚠️ No trained model found — skipping HuggingFace upload"
          exit 0
        fi

        echo "📤 Uploading model to HuggingFace Hub..."
        echo "   Source: $BEST_MODEL"
        echo "   Repository: $REPO_ID"

        pip install huggingface_hub --quiet

        # Convert NanEcho checkpoint to HuggingFace format
        python NanEcho/convert_to_huggingface.py \
          --checkpoint "$BEST_MODEL" \
          --output-dir hf-model

        # Upload converted model folder to the Hub
        python scripts/upload_to_huggingface.py

        echo "✅ Model uploaded to HuggingFace Hub: $REPO_ID"

    - name: Upload cached training artifacts
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: nanecho-cached-training-${{ steps.params.outputs.cache_key }}
        path: |
          echoself/${{ steps.params.outputs.output_dir }}/
        retention-days: 30
        if-no-files-found: warn

    - name: Upload checkpoint backup artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: checkpoint-backup-${{ github.run_number }}
        path: |
          echoself/.training-progress/checkpoints/
          /tmp/nanecho-checkpoint-backup/
        retention-days: 90
        if-no-files-found: warn

    - name: Upload emergency sweep artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: emergency-sweep-${{ github.run_number }}
        path: |
          /tmp/nanecho-emergency-sweep/
        retention-days: 90
        if-no-files-found: warn

    - name: Upload training summary
      if: always()
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: training-summary-${{ steps.params.outputs.cache_key }}
        path: echoself/${{ steps.params.outputs.output_dir }}/training_summary.json
        retention-days: 30
        if-no-files-found: warn
    
    - name: Configure Git
      if: always()
      continue-on-error: true
      run: |
        cd echoself
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
    
    - name: Commit and push training progress
      if: always()
      continue-on-error: true
      run: |
        cd echoself
        
        # Ensure .training-progress directory exists (should already exist from repo)
        mkdir -p .training-progress
        
        # Stage the training progress directory with any new files
        git add .training-progress/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "✅ No new training progress to commit"
        else
          # Commit with detailed message for training session tracking
          git commit -m "chore: update training progress (run ${{ github.run_number }})" \
                     -m "Mode: ${{ steps.params.outputs.cache_key }} | Iters: ${{ steps.params.outputs.max_iters }} | Layers: ${{ steps.params.outputs.n_layer }} | Emb: ${{ steps.params.outputs.n_embd }}" \
                     -m "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          echo "📤 Pushing training progress to repository..."
          
          # Generate timestamp once for consistency
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          # Determine the target branch: use current branch or fall back to GitHub context
          BRANCH_NAME=$(git symbolic-ref --short HEAD 2>/dev/null || echo "${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}")
          echo "ℹ️ Pushing to branch: $BRANCH_NAME"
          
          # Multi-layer fallback mechanism to ensure changes are NEVER lost
          PUSH_SUCCESS=false
          
          # Attempt 1: Pull with rebase and push (standard approach)
          echo "🔄 Attempt 1: Pull with rebase and push..."
          if git pull --rebase origin $BRANCH_NAME 2>&1 && git push origin HEAD:$BRANCH_NAME 2>&1; then
            echo "✅ Push successful on first attempt"
            PUSH_SUCCESS=true
          else
            echo "⚠️ First attempt failed, trying fallback strategies..."
            
            # Attempt 2: Retry with fresh pull and push
            echo "🔄 Attempt 2: Retry with fresh pull..."
            sleep 2
            if git fetch origin $BRANCH_NAME 2>&1 && \
               git rebase origin/$BRANCH_NAME 2>&1 && \
               git push origin HEAD:$BRANCH_NAME 2>&1; then
              echo "✅ Push successful on second attempt"
              PUSH_SUCCESS=true
            else
              echo "⚠️ Second attempt failed, trying force push with lease..."
              
              # Attempt 3: Force push with lease (safe force push)
              echo "🔄 Attempt 3: Force push with lease..."
              if git push --force-with-lease origin HEAD:$BRANCH_NAME 2>&1; then
                echo "✅ Force push with lease successful"
                PUSH_SUCCESS=true
              else
                echo "⚠️ Force push with lease failed, trying alternative branch..."
                
                # Attempt 4: Push to alternative timestamped branch as backup
                BACKUP_BRANCH="training-progress-backup-$TIMESTAMP"
                echo "🔄 Attempt 4: Creating backup branch $BACKUP_BRANCH..."
                if git push origin HEAD:$BACKUP_BRANCH 2>&1; then
                  echo "✅ Changes saved to backup branch: $BACKUP_BRANCH"
                  echo "⚠️ WARNING: Changes are in backup branch $BACKUP_BRANCH, not $BRANCH_NAME"
                  PUSH_SUCCESS=true
                else
                  echo "❌ All git push attempts failed!"
                  echo "🆘 CRITICAL: Creating emergency artifact..."
                  
                  # Attempt 5: Save as artifact (last resort - DATA MUST BE PRESERVED)
                  ARTIFACT_DIR="/tmp/training-progress-artifact-$TIMESTAMP"
                  mkdir -p "$ARTIFACT_DIR"
                  
                  # Copy training progress files if they exist
                  if [ -d ".training-progress" ] && [ "$(ls -A .training-progress 2>/dev/null)" ]; then
                    cp -r .training-progress/* "$ARTIFACT_DIR/" 2>/dev/null || true
                  fi
                  
                  {
                    echo "CRITICAL: Git push failed - Training progress saved as artifact"
                    echo "DATA PRESERVATION > SECURITY - Changes must never be lost"
                    echo ""
                    echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
                    echo "Branch: $BRANCH_NAME"
                    echo "Commit: $(git rev-parse HEAD)"
                    echo "Workflow: netrain-cached.yml"
                    echo ""
                    echo "RECOVERY: Download artifact and manually push to repository"
                  } > "$ARTIFACT_DIR/RECOVERY_MANIFEST.txt"
                  
                  echo "📦 Emergency artifact created at: $ARTIFACT_DIR"
                  PUSH_SUCCESS=true
                fi
              fi
            fi
          fi
          
          if [ "$PUSH_SUCCESS" = true ]; then
            echo "✅ Training progress successfully saved!"
          else
            echo "❌ FATAL: All fallback mechanisms exhausted"
            exit 1
          fi
        fi